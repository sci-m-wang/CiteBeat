<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#1e4fc2"/>
    </linearGradient>
    <linearGradient id="iconbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#1e4fc2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bg)"/>
  <g opacity="0.08" fill="#fff">
    <circle cx="120" cy="700" r="180"/>
    <circle cx="1180" cy="120" r="140"/>
    <circle cx="980" cy="720" r="80"/>
  </g>

  <!-- Left: text block -->
  <g transform="translate(90, 170)">
    <text x="0" y="0" fill="#fff" font-family="-apple-system, Helvetica, Arial, sans-serif" font-weight="800" font-size="96">
      CiteBeat
    </text>
    <text x="0" y="62" fill="#dde7ff" font-family="-apple-system, Helvetica, Arial, sans-serif" font-weight="500" font-size="30">
      听见你引用的节拍
    </text>

    <g transform="translate(0, 130)" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="26" fill="#ffffff">
      <g transform="translate(0, 0)">
        <circle cx="14" cy="14" r="14" fill="#ffffff" opacity="0.25"/>
        <text x="14" y="21" text-anchor="middle" font-weight="700" fill="#fff">1</text>
        <text x="44" y="22" fill="#ffffff">定时抓取 Google Scholar / Semantic Scholar</text>
      </g>
      <g transform="translate(0, 56)">
        <circle cx="14" cy="14" r="14" fill="#ffffff" opacity="0.25"/>
        <text x="14" y="21" text-anchor="middle" font-weight="700" fill="#fff">2</text>
        <text x="44" y="22" fill="#ffffff">工具栏徽章实时显示总引用数</text>
      </g>
      <g transform="translate(0, 112)">
        <circle cx="14" cy="14" r="14" fill="#ffffff" opacity="0.25"/>
        <text x="14" y="21" text-anchor="middle" font-weight="700" fill="#fff">3</text>
        <text x="44" y="22" fill="#ffffff">一键查看本周期引用增长的论文</text>
      </g>
      <g transform="translate(0, 168)">
        <circle cx="14" cy="14" r="14" fill="#ffffff" opacity="0.25"/>
        <text x="14" y="21" text-anchor="middle" font-weight="700" fill="#fff">4</text>
        <text x="44" y="22" fill="#ffffff">数据仅本地存储，不上传任何服务器</text>
      </g>
    </g>
  </g>

  <!-- Right: mock popup card -->
  <g transform="translate(740, 110)">
    <!-- shadow -->
    <rect x="10" y="16" width="460" height="580" rx="24" fill="#000" opacity="0.25" filter="url(#shadow)"/>
    <!-- card -->
    <rect x="0" y="0" width="460" height="580" rx="20" fill="#fafafa"/>

    <!-- header -->
    <rect x="0" y="0" width="460" height="64" rx="20" fill="url(#iconbg)"/>
    <rect x="0" y="40" width="460" height="24" fill="url(#iconbg)"/>
    <g transform="translate(20, 20)">
      <!-- mini icon -->
      <rect x="0" y="0" width="24" height="24" rx="5" fill="#ffffff" opacity="0.25"/>
      <text x="12" y="18" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="18" fill="#fff">&#8220;</text>
    </g>
    <text x="54" y="39" fill="#fff" font-family="-apple-system, Helvetica, Arial, sans-serif" font-weight="600" font-size="18">CiteBeat</text>

    <!-- summary -->
    <rect x="0" y="64" width="460" height="96" fill="#fff"/>
    <text x="20" y="94" fill="#888" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14">总引用</text>
    <text x="20" y="138" fill="#1e4fc2" font-family="-apple-system, Helvetica, Arial, sans-serif" font-weight="800" font-size="42">12,874</text>
    <!-- source tag -->
    <rect x="330" y="78" width="116" height="24" rx="12" fill="#e8efff"/>
    <text x="388" y="95" text-anchor="middle" fill="#1e4fc2" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">Google Scholar</text>
    <text x="440" y="124" text-anchor="end" fill="#888" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12">更新: 刚刚</text>

    <!-- divider -->
    <rect x="0" y="160" width="460" height="1" fill="#eee"/>

    <!-- growth header -->
    <text x="20" y="192" fill="#1c1c1e" font-family="-apple-system, Helvetica, Arial, sans-serif" font-weight="600" font-size="15">本周期新增引用</text>
    <rect x="172" y="178" width="52" height="20" rx="10" fill="#1e4fc2"/>
    <text x="198" y="193" text-anchor="middle" fill="#fff" font-family="-apple-system, Helvetica, Arial, sans-serif" font-weight="700" font-size="12">+14</text>
    <text x="440" y="192" text-anchor="end" fill="#1e4fc2" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13">重置基线</text>

    <!-- items -->
    <g font-family="-apple-system, Helvetica, Arial, sans-serif">
      <g transform="translate(14, 212)">
        <rect x="0" y="0" width="432" height="58" rx="8" fill="#fff" stroke="#eee"/>
        <text x="12" y="22" fill="#1c1c1e" font-size="13" font-weight="600">Attention Is All You Need</text>
        <text x="12" y="42" fill="#666" font-size="12">Vaswani et al., NeurIPS 2017</text>
        <text x="420" y="28" text-anchor="end" fill="#0a7a2f" font-weight="700" font-size="14">+6</text>
        <text x="420" y="46" text-anchor="end" fill="#888" font-size="11">124,003</text>
      </g>
      <g transform="translate(14, 278)">
        <rect x="0" y="0" width="432" height="58" rx="8" fill="#fff" stroke="#eee"/>
        <text x="12" y="22" fill="#1c1c1e" font-size="13" font-weight="600">BERT: Pre-training of Deep Bidirectional</text>
        <text x="12" y="42" fill="#666" font-size="12">Devlin et al., NAACL 2019</text>
        <text x="420" y="28" text-anchor="end" fill="#0a7a2f" font-weight="700" font-size="14">+4</text>
        <text x="420" y="46" text-anchor="end" fill="#888" font-size="11">98,451</text>
      </g>
      <g transform="translate(14, 344)">
        <rect x="0" y="0" width="432" height="58" rx="8" fill="#fff" stroke="#eee"/>
        <text x="12" y="22" fill="#1c1c1e" font-size="13" font-weight="600">Deep Residual Learning for Image Recognition</text>
        <text x="12" y="42" fill="#666" font-size="12">He et al., CVPR 2016</text>
        <text x="420" y="28" text-anchor="end" fill="#0a7a2f" font-weight="700" font-size="14">+3</text>
        <text x="420" y="46" text-anchor="end" fill="#888" font-size="11">187,220</text>
      </g>
      <g transform="translate(14, 410)">
        <rect x="0" y="0" width="432" height="58" rx="8" fill="#fff" stroke="#eee"/>
        <text x="12" y="22" fill="#1c1c1e" font-size="13" font-weight="600">Language Models are Few-Shot Learners</text>
        <text x="12" y="42" fill="#666" font-size="12">Brown et al., NeurIPS 2020</text>
        <text x="420" y="28" text-anchor="end" fill="#0a7a2f" font-weight="700" font-size="14">+1</text>
        <text x="420" y="46" text-anchor="end" fill="#888" font-size="11">42,891</text>
      </g>
    </g>
  </g>

  <!-- Bottom hint -->
  <text x="90" y="740" fill="#dde7ff" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="18">
    本地存储 · 无第三方追踪 · 免费开源
  </text>
</svg>
