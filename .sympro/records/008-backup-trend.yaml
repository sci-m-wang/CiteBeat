id: record-0008
timestamp: 2026-06-01T00:00:00Z
summary: >-
  v0.2.1 adds manual backup/restore and a lightweight popup citation trend.
  Users can export local settings, current citation state, statistics period
  data, and citation history as a JSON file, then manually restore that backup
  with validation and confirmation. The popup now filters citationHistory by
  the active data source and author, rendering a compact SVG trend for recent
  total-citation snapshots without introducing new permissions or chart
  dependencies.
