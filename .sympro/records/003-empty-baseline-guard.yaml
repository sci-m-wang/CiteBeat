provenance:
  prompt_mode: summary
  prompt_summary: >-
    User diagnosed via storage inspection that baselinePapers and
    currentPapers were both empty maps despite a valid citations total
    of 571, which made per-paper growth impossible. Root cause: the
    seeding code wrote an empty {} as the baseline.
