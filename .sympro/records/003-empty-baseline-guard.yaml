id: record-0003
timestamp: 2026-04-22T01:30:00Z
summary: >-
  v0.1.3 hardens updateCitations against partial fetches. Previously, if
  fetchScholar succeeded enough to return a total citation count but
  parsed zero paper rows (markup change, partial response, MV3 service
  worker eviction mid-fetch), the empty paper map was happily written
  into both currentPapers and baselinePapers, leaving the extension
  permanently unable to compute per-paper deltas. Now an empty paper
  result keeps the previous currentPapers and never seeds a new
  baseline; only the citations total and lastUpdatedAt are refreshed.
