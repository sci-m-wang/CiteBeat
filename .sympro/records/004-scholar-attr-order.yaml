provenance:
  prompt_mode: summary
  prompt_summary: >-
    User pasted live Google Scholar row HTML showing `<a href="..."
    class="gsc_a_at">` (href before class). The previous regex required
    class before href and therefore never matched any titles, even
    though row count and citation count regexes still worked.
validation:
  review_status: reviewed
  validation_mode:
    - human_review
    - manual_testing
  checks:
