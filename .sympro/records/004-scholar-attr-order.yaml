id: record-0004
timestamp: 2026-04-22T02:00:00Z
summary: >-
  v0.1.4 fixes the actual reason no Scholar papers were being parsed:
  the row-level title regex required class="gsc_a_at" to appear before
  href="..." inside the anchor tag, but Google Scholar now serves the
  attributes in the opposite order. Parsing the anchor and its href
  separately removes the attribute-order dependency and recovers
  per-paper data.
participation_mode:
  - implementation
  - bugfix
