id: record-0006
timestamp: 2026-04-22T03:30:00Z
summary: >-
  v0.1.8 surfaces the individual papers whose citation count decreased
  or that disappeared from current. Previously these were lumped into
  a single aggregate ("N papers were merged/removed"). The popup now
  renders a dedicated "引用减少 / 被合并" sub-list under the growth
  list, naming each paper, the negative delta, and whether it was a
  drop (paper still present) or a removal (paper merged away).
